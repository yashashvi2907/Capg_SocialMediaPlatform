<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<h2>User Notifications</h2>
<p th:if="${#lists.isEmpty(notifications)}">
    No notifications found.
</p>

<table>
    <thead>
    <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Content</th>
        <th>Timestamp</th>
        <th>Profile</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="n : ${notifications}">
        <td th:text="${n.username}"></td>
        <td th:text="${n.email}"></td>
        <td th:text="${n.content}"></td>
        <td th:text="${n.timestamp}"></td>

        <td>
            <img th:if="${n.profileBase64 != null}"
                 th:src="'data:image/jpeg;base64,' + ${n.profileBase64}"
                 width="50" height="50"/>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
